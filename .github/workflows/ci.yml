on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: check what is there in v3 version
        uses: action/checkout@v3
      - name: check current directory
        run: pwd
      - name: list files and folder in current directory
        run: ls -la



